version: '3.8'

services:
  admin-panel:
    build: .
    container_name: game-admin-panel
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${GAME_CONFIG_ROOT:-/home/tyler/Docker/games}:/host-games:ro
    environment:
      - PORT=${PORT:-3000}
      - GAME_CONFIG_ROOT=/host-games
      - ICARUS_RCON_PASSWORD=${ICARUS_RCON_PASSWORD:-dateniteroolz}
    restart: unless-stopped

networks:
  default:
    name: game-network
    external: true