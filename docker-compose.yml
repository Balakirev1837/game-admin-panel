version: '3.8'

services:
  admin-panel:
    build: .
    container_name: game-admin-panel
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${GAME_CONFIG_ROOT:-/home/tyler/Docker/games}:/host-games:rw
    environment:
      - PORT=${PORT:-3000}
      - GAME_CONFIG_ROOT=/host-games
      - GAME_CONFIG_ROOT_HOST=${GAME_CONFIG_ROOT:-/home/tyler/Docker/games}
      - ICARUS_RCON_PASSWORD=${ICARUS_RCON_PASSWORD:-dateniteroolz}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BACKUP_RETENTION=${BACKUP_RETENTION:-10}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    restart: unless-stopped

networks:
  default:
    name: game-network
    external: true