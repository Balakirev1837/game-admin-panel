# Docker Compose for Game Admin Panel Deployment
#
# Quick Start:
#   1. Copy .env.example to .env and adjust values:
#        cp .env.example .env
#   2. Build and start the panel:
#        docker-compose up --build -d
#   3. Access the panel at http://localhost:3000
#
# The Docker socket is mounted so the panel can manage containers
# on the host. The ./config directory is mounted for game config files.

version: '3.8'
services:
  admin-panel:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/config
    environment:
      - PORT=${PORT:-3000}
      - DOCKER_HOST=${DOCKER_HOST:-}
      - ICARUS_RCON_PASSWORD=${ICARUS_RCON_PASSWORD:-dateniteroolz}
      - ICARUS_CONFIG_PATH=${ICARUS_CONFIG_PATH:-/config/ServerSettings.ini}
    restart: unless-stopped
