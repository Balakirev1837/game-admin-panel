<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Server Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <header class="bg-gray-800 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-6 flex items-center justify-between">
      <h1 class="text-3xl font-bold text-white">Game Server Admin Panel</h1>
      <div class="flex items-center gap-3">
        <span id="version-display" class="text-xs text-gray-500">v—</span>
        <button id="logout-btn" class="hidden px-3 py-1 text-xs font-medium rounded bg-gray-700 hover:bg-gray-600 text-gray-300 transition-colors">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="host-stats" class="hidden mb-6 bg-gray-800 rounded-lg shadow-md p-4 border border-gray-700">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold text-white">Host</h2>
        <div class="flex gap-3 text-xs text-gray-400">
          <span id="host-name"></span>
          <span id="host-uptime"></span>
          <span id="host-docker-ver"></span>
        </div>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs">
        <div>
          <div class="flex justify-between text-gray-400 mb-1"><span>Memory</span><span id="host-mem-label">—</span></div>
          <div class="w-full bg-gray-700 rounded-full h-1.5"><div id="host-mem-bar" class="bg-green-500 h-1.5 rounded-full transition-all duration-700" style="width:0%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-gray-400 mb-1"><span>Load (1/5/15m)</span><span id="host-load-label">—</span></div>
        </div>
        <div>
          <div class="flex justify-between text-gray-400 mb-1"><span>CPU Cores</span><span id="host-cpus-label">—</span></div>
        </div>
        <div>
          <div class="flex justify-between text-gray-400 mb-1"><span>Containers</span><span id="host-containers-label">—</span></div>
        </div>
      </div>
    </div>

    <div id="server-list" class="grid gap-4">
      <!-- Server cards will be rendered here -->
    </div>

    <div id="loading" class="flex items-center justify-center py-12">
      <svg class="animate-spin h-8 w-8 text-blue-400 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
      <span class="text-gray-400 text-lg">Loading servers...</span>
    </div>

    <div id="error" class="hidden text-center py-12">
      <p class="text-red-400 text-lg">Failed to load servers. Please try again later.</p>
    </div>

    <div id="empty" class="hidden text-center py-12">
      <p class="text-gray-500 text-lg">No servers found.</p>
    </div>
  </main>

  <!-- Toast notification container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Config Editor Modal -->
  <div id="config-modal" class="hidden fixed inset-0 z-40 flex items-center justify-center">
    <div class="absolute inset-0 bg-black bg-opacity-60" id="config-modal-backdrop"></div>
    <div class="relative bg-gray-800 rounded-lg shadow-2xl border border-gray-600 w-full max-w-2xl max-h-[90vh] flex flex-col mx-4">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700">
        <h2 id="config-modal-title" class="text-xl font-semibold text-white">Server Config</h2>
        <button id="config-modal-close" class="text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      </div>
      <div id="config-modal-body" class="overflow-y-auto px-6 py-4 flex-1">
        <!-- Config form fields rendered here -->
      </div>
      <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-700">
        <button id="config-modal-backups" class="px-4 py-2 rounded-md bg-gray-600 text-gray-200 hover:bg-gray-500 transition">Backups</button>
        <button id="config-modal-cancel" class="px-4 py-2 rounded-md bg-gray-600 text-gray-200 hover:bg-gray-500 transition">Cancel</button>
        <button id="config-modal-save" class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-500 transition font-medium">Save Config</button>
      </div>
    </div>
  </div>

  <!-- Create Prospect Modal -->
  <div id="prospect-modal" class="hidden fixed inset-0 z-40 flex items-center justify-center">
    <div class="absolute inset-0 bg-black bg-opacity-60" id="prospect-modal-backdrop"></div>
    <div class="relative bg-gray-800 rounded-lg shadow-2xl border border-gray-600 w-full max-w-md mx-4">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700">
        <h2 class="text-xl font-semibold text-white">Create Prospect</h2>
        <button id="prospect-modal-close" class="text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      </div>
      <div class="px-6 py-4 space-y-3">
        <div>
          <label for="prospect-type" class="block text-sm font-medium text-gray-300 mb-1">Prospect Type</label>
          <select id="prospect-type" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500"></select>
        </div>
        <div>
          <label for="prospect-difficulty" class="block text-sm font-medium text-gray-300 mb-1">Difficulty</label>
          <select id="prospect-difficulty" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500">
            <option value="1">1 — Easy</option>
            <option value="2">2 — Normal</option>
            <option value="3" selected>3 — Hard</option>
            <option value="4">4 — Extreme</option>
          </select>
        </div>
        <div>
          <label for="prospect-hardcore" class="block text-sm font-medium text-gray-300 mb-1">Hardcore</label>
          <select id="prospect-hardcore" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500">
            <option value="false" selected>False — Respawns allowed</option>
            <option value="true">True — No respawns</option>
          </select>
        </div>
        <div>
          <label for="prospect-savename" class="block text-sm font-medium text-gray-300 mb-1">Save Name</label>
          <input type="text" id="prospect-savename" placeholder="MyProspect" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500">
          <p class="text-xs text-gray-500 mt-1">Required for outposts. Optional for prospects (auto-generates if empty).</p>
        </div>
      </div>
      <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-700">
        <button id="prospect-modal-cancel" class="px-4 py-2 rounded-md bg-gray-600 text-gray-200 hover:bg-gray-500 transition">Cancel</button>
        <button id="prospect-modal-send" class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-500 transition font-medium">Send Command</button>
      </div>
    </div>
  </div>

  <!-- Prospects Upload Modal -->
  <div id="prospects-modal" class="hidden fixed inset-0 z-40 flex items-center justify-center">
    <div class="absolute inset-0 bg-black bg-opacity-60" id="prospects-modal-backdrop"></div>
    <div class="relative bg-gray-800 rounded-lg shadow-2xl border border-gray-600 w-full max-w-md mx-4">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700">
        <h2 id="prospects-modal-title" class="text-xl font-semibold text-white">Prospects</h2>
        <button id="prospects-modal-close" class="text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      </div>
      <div id="prospects-modal-body" class="px-6 py-4 space-y-4 max-h-96 overflow-y-auto">
        <!-- Existing prospects list and upload form -->
      </div>
      <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-700">
        <button id="prospects-modal-cancel" class="px-4 py-2 rounded-md bg-gray-600 text-gray-200 hover:bg-gray-500 transition">Close</button>
        <button id="prospects-modal-upload" class="px-4 py-2 rounded-md bg-green-600 text-white hover:bg-green-500 transition font-medium">Upload</button>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black bg-opacity-80"></div>
    <div class="relative bg-gray-800 rounded-lg shadow-2xl border border-gray-600 w-full max-w-sm mx-4">
      <div class="px-6 py-6">
        <h2 class="text-xl font-semibold text-white mb-4 text-center">Login</h2>
        <form id="login-form" class="space-y-4">
          <div>
            <label for="login-username" class="block text-sm font-medium text-gray-300 mb-1">Username</label>
            <input type="text" id="login-username" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500" placeholder="admin" autocomplete="username">
          </div>
          <div>
            <label for="login-password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
            <input type="password" id="login-password" class="w-full bg-gray-700 border border-gray-600 rounded-md px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500" placeholder="Password" autocomplete="current-password">
          </div>
          <div id="login-error" class="hidden text-sm text-red-400"></div>
          <button type="submit" id="login-submit" class="w-full px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-500 transition font-medium">Sign In</button>
        </form>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
